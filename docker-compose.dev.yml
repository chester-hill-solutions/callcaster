# Local dev stack for post-migration Callcaster (Phase 0 scaffold).
# App runs natively via `npm run dev`; Bun dev replaces Express in Phase 3F.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   export DATABASE_URL=postgresql://callcaster:callcaster@127.0.0.1:5432/callcaster
#   # After squashed baseline lands:
#   # drizzle-kit push   # or migrate against drizzle/

services:
  postgres:
    image: postgres:15-alpine
    container_name: callcaster-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: callcaster
      POSTGRES_PASSWORD: callcaster
      POSTGRES_DB: callcaster
    volumes:
      - callcaster_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcaster -d callcaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: callcaster-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: callcaster
      MINIO_ROOT_PASSWORD: callcaster-dev-secret
    volumes:
      - callcaster_minio:/data

  inbucket:
    image: inbucket/inbucket:latest
    container_name: callcaster-inbucket
    ports:
      - "9002:9000"
      - "2500:2500"

volumes:
  callcaster_pgdata:
  callcaster_minio:
