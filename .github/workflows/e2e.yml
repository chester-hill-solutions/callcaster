name: E2E

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Postgres CLI
        uses: client/setup-cli@v1
        with:
          version: latest

      - name: Start Postgres
        run: client start

      - name: Reset database
        run: client db reset

      - name: Export Postgres env
        run: |
          eval "$(client status -o env)"
          echo "AUTH_URL=${API_URL}" >> "$GITHUB_ENV"
          echo "AUTH_ANON_KEY=${ANON_KEY}" >> "$GITHUB_ENV"
          echo "AUTH_SERVICE_KEY=${SERVICE_ROLE_KEY}" >> "$GITHUB_ENV"
          echo "AUTH_PUBLISHABLE_KEY=${ANON_KEY}" >> "$GITHUB_ENV"

      - name: Seed E2E data
        run: npm run test:e2e:seed
        env:
          BASE_URL: http://localhost:3000
          TWILIO_VALIDATE_WEBHOOKS: "false"
          STRIPE_SECRET_KEY: sk_test_e2e_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_e2e_placeholder
          RESEND_API_KEY: re_e2e_placeholder
          TWILIO_SID: AC_e2e_test_sid_placeholder
          TWILIO_AUTH_TOKEN: e2e_twilio_auth_token
          TWILIO_APP_SID: AP_e2e_test_app_sid
          TWILIO_PHONE_NUMBER: "+15555501001"

      - name: Build app
        run: npm run build
        env:
          BASE_URL: http://localhost:3000
          TWILIO_VALIDATE_WEBHOOKS: "false"
          STRIPE_SECRET_KEY: sk_test_e2e_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_e2e_placeholder
          RESEND_API_KEY: re_e2e_placeholder
          TWILIO_SID: AC_e2e_test_sid_placeholder
          TWILIO_AUTH_TOKEN: e2e_twilio_auth_token
          TWILIO_APP_SID: AP_e2e_test_app_sid
          TWILIO_PHONE_NUMBER: "+15555501001"

      - name: Start server
        run: |
          npm run test:e2e:server &
          echo $! > server.pid
        env:
          BASE_URL: http://localhost:3000
          E2E_BASE_URL: http://localhost:3000
          TWILIO_VALIDATE_WEBHOOKS: "false"
          STRIPE_SECRET_KEY: sk_test_e2e_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_e2e_placeholder
          RESEND_API_KEY: re_e2e_placeholder
          TWILIO_SID: AC_e2e_test_sid_placeholder
          TWILIO_AUTH_TOKEN: e2e_twilio_auth_token
          TWILIO_APP_SID: AP_e2e_test_app_sid
          TWILIO_PHONE_NUMBER: "+15555501001"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:3000
          AUTH_URL: ${{ env.AUTH_URL }}
          AUTH_SERVICE_KEY: ${{ env.AUTH_SERVICE_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            playwright-report/

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" || true; fi
